<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundScript — Contact &amp; Strategic Discussions</title>
    <meta name="description" content="Contact SoundScript. Reach the maintainer at info@dharangutti.in. Open to strategic conversations regarding future direction.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://soundscript.net/contact/">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="SoundScript">
    <meta property="og:title" content="SoundScript — Contact & Strategic Discussions">
    <meta property="og:description" content="Contact SoundScript. Open to strategic conversations regarding future direction.">
    <meta property="og:url" content="https://soundscript.net/contact/">
    <style>
        :root {
            --bg: #0b0d12;
            --surface: #141820;
            --border: #2a3347;
            --text: #e8ecf4;
            --muted: #9aa6bd;
            --accent: #6ee7b7;
            --radius: 12px;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, sans-serif;
            background:
                radial-gradient(ellipse 80% 50% at 50% -10%, rgba(129, 140, 248, 0.18), transparent),
                radial-gradient(ellipse 60% 40% at 100% 0%, rgba(110, 231, 183, 0.1), transparent),
                var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        .wrap {
            width: 100%;
            max-width: 960px;
            margin: 0 auto;
            padding: 1.5rem 1.25rem;
        }

        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .logo { font-weight: 700; font-size: 1.15rem; color: var(--text); }
        .logo span { color: var(--accent); }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .contact-card {
            width: 100%;
            max-width: 34rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem 2.25rem;
            text-align: center;
        }

        .contact-card h1 {
            font-size: clamp(1.5rem, 4vw, 2rem);
            margin: 0 0 1.25rem;
        }

        .contact-block {
            margin: 0;
            font-size: 1.05rem;
            line-height: 2;
        }

        .contact-block .label {
            display: block;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: 0.04em;
            text-transform: uppercase;
            font-size: 0.8rem;
            margin-bottom: 0.25rem;
        }

        .contact-note {
            margin: 1.5rem 0 0;
            color: var(--muted);
            font-size: 0.95rem;
        }

        footer {
            border-top: 1px solid var(--border);
            text-align: center;
            color: var(--muted);
            font-size: 0.9rem;
            padding: 1.25rem 1.25rem 1.5rem;
        }

        footer a { color: var(--muted); }
        footer a:hover { color: var(--accent); }
    </style>
</head>
<body>
    <div class="wrap">
        <nav>
            <a class="logo" href="/">Sound<span>Script</span></a>
            <div>
                <a href="/">Home</a>
            </div>
        </nav>
    </div>

    <main>
        <div class="contact-card">
            <h1>SoundScript — Contact &amp; Strategic Discussions</h1>
            <p class="contact-block">
                <span class="label">Contact</span>
                <a href="mailto:info@dharangutti.in">info@dharangutti.in</a><br>
                <a href="https://dharangutti.in">dharangutti.in</a>
            </p>
            <p class="contact-note">Open to strategic conversations regarding future direction.</p>
        </div>
    </main>

    <footer>
        <p>
            © SoundScript<br>
            Contact: <a href="mailto:info@dharangutti.in">info@dharangutti.in</a><br>
            <a href="https://dharangutti.in">dharangutti.in</a><br>
            Open to strategic conversations regarding future direction.
        </p>
    </footer>
</body>
</html>
