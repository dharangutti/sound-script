<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundScript Documentation</title>
    <meta name="description" content="SoundScript documentation — deterministic text-to-MIDI music language.">
    <meta name="robots" content="index, follow">
    <style>
        :root {
            --bg: #0b0d12;
            --surface: #141820;
            --surface-2: #1c2230;
            --border: #2a3347;
            --text: #e8ecf4;
            --muted: #9aa6bd;
            --accent: #6ee7b7;
            --accent-2: #818cf8;
            --gold: #fbbf24;
            --code-bg: #0f131a;
            --radius: 12px;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, sans-serif;
            background:
                radial-gradient(ellipse 80% 50% at 50% -10%, rgba(129, 140, 248, 0.18), transparent),
                radial-gradient(ellipse 60% 40% at 100% 0%, rgba(110, 231, 183, 0.1), transparent),
                var(--bg);
            color: var(--text);
            line-height: 1.65;
        }

        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        .wrap {
            max-width: 860px;
            margin: 0 auto;
            padding: 1.5rem 1.25rem 4rem;
        }

        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
            padding: 0.5rem 0 1.5rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 2rem;
        }

        .logo {
            font-weight: 700;
            font-size: 1.05rem;
            color: var(--text);
        }

        .logo span { color: var(--accent); }

        .nav-links {
            display: flex;
            gap: 1.1rem;
            flex-wrap: wrap;
            font-size: 0.92rem;
        }

        .nav-links a { color: var(--muted); }
        .nav-links a:hover { color: var(--accent); text-decoration: none; }

        .doc-meta {
            display: flex;
            justify-content: flex-end;
            font-size: 0.82rem;
            color: var(--muted);
            margin-bottom: 1rem;
        }

        #content h1, #content h2, #content h3, #content h4 {
            line-height: 1.3;
            letter-spacing: -0.01em;
        }

        #content h1 {
            font-size: 2rem;
            margin: 0 0 1rem;
            background: linear-gradient(135deg, var(--text), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #content h2 {
            font-size: 1.4rem;
            margin: 2.25rem 0 0.75rem;
            padding-top: 1.25rem;
            border-top: 1px solid var(--border);
        }

        #content h3 { font-size: 1.1rem; margin: 1.75rem 0 0.5rem; }

        #content p { margin: 0.75rem 0; }

        #content blockquote {
            margin: 1rem 0;
            padding: 0.6rem 1.1rem;
            border-left: 3px solid var(--accent-2);
            background: var(--surface);
            border-radius: 0 8px 8px 0;
            color: var(--muted);
        }

        #content blockquote p { margin: 0.25rem 0; }

        #content code {
            font-family: "SF Mono", "Cascadia Code", Consolas, monospace;
            font-size: 0.88em;
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: 5px;
            padding: 0.1rem 0.35rem;
            color: var(--accent);
        }

        #content pre {
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem 1.15rem;
            overflow-x: auto;
            line-height: 1.55;
        }

        #content pre code {
            background: none;
            border: none;
            padding: 0;
            color: var(--text);
            font-size: 0.85rem;
        }

        #content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
            font-size: 0.92rem;
            display: block;
            overflow-x: auto;
        }

        #content th, #content td {
            text-align: left;
            padding: 0.55rem 0.9rem;
            border: 1px solid var(--border);
        }

        #content th {
            background: var(--surface-2);
            font-weight: 600;
            white-space: nowrap;
        }

        #content tr:nth-child(even) td { background: var(--surface); }

        #content ul, #content ol { padding-left: 1.5rem; }
        #content li { margin: 0.3rem 0; }

        #content hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 2rem 0;
        }

        #content img { max-width: 100%; }

        .error {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            color: var(--muted);
        }

        footer {
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 0.88rem;
            color: var(--muted);
        }

        @media (max-width: 640px) {
            #content h1 { font-size: 1.6rem; }
            .nav-links { gap: 0.8rem; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <nav>
            <a class="logo" href="/">Sound<span>Script</span></a>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/playground/">Playground</a>
                <a href="/doc.html?p=user-guide.md">User Guide</a>
                <a href="/doc.html?p=SoundScript.md">Docs</a>
                <a href="/industrial/">Industrial</a>
                <a href="https://github.com/dharangutti/sound-script">GitHub</a>
            </div>
        </nav>

        <div class="doc-meta"><a id="source-link" href="#">View Markdown source</a></div>

        <main id="content"><p style="color:var(--muted);">Loading…</p></main>

        <footer>
            <p>
                <a href="/">Home</a> ·
                <a href="/playground/">Playground</a> ·
                <a href="/doc.html?p=SoundScript.md">Documentation</a> ·
                <a href="https://github.com/dharangutti/sound-script">GitHub</a>
            </p>
            <p style="margin-top:0.4rem;">SoundScript · MIT License · Deterministic text to MIDI and Wave.</p>
            <p style="margin-top:0.4rem;">
                © SoundScript<br>
                Contact: <a href="mailto:info@dharangutti.in">info@dharangutti.in</a><br>
                <a href="https://dharangutti.in">dharangutti.in</a>
            </p>
        </footer>
    </div>

    <script src="assets/marked.min.js"></script>
    <script>
        (function () {
            var DEFAULT_PAGE = 'SoundScript.md';
            var param = new URLSearchParams(window.location.search).get('p') || DEFAULT_PAGE;

            // Same-directory .md files only — no slashes, no traversal.
            if (!/^[A-Za-z0-9][A-Za-z0-9._-]*\.md$/.test(param)) {
                param = DEFAULT_PAGE;
            }

            var content = document.getElementById('content');
            var sourceLink = document.getElementById('source-link');
            sourceLink.href = param;

            function fail(message) {
                content.innerHTML = '<div class="error"><p>' + message + '</p>' +
                    '<p><a href="' + param + '">Open the raw Markdown file</a> or go back to the <a href="/">home page</a>.</p></div>';
            }

            fetch(param, { cache: 'no-cache' })
                .then(function (response) {
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    return response.text();
                })
                .then(function (markdown) {
                    content.innerHTML = marked.parse(markdown, { mangle: false, headerIds: true });

                    var heading = content.querySelector('h1');
                    if (heading) document.title = heading.textContent + ' — SoundScript';

                    // Keep readers inside the HTML view: relative .md links go
                    // through this viewer; repo-relative example files go to GitHub.
                    content.querySelectorAll('a[href]').forEach(function (link) {
                        var href = link.getAttribute('href');
                        if (/^https?:\/\//.test(href) || href.startsWith('#')) return;

                        var parts = href.split('#');
                        var path = parts[0];
                        var hash = parts[1] ? '#' + parts[1] : '';

                        if (/^[A-Za-z0-9][A-Za-z0-9._-]*\.md$/.test(path)) {
                            link.setAttribute('href', 'doc.html?p=' + path + hash);
                        } else if (path.startsWith('../')) {
                            link.setAttribute('href',
                                'https://github.com/dharangutti/sound-script/blob/main/' + path.replace(/^(\.\.\/)+/, ''));
                        }
                    });

                    if (window.location.hash) {
                        var target = document.getElementById(window.location.hash.slice(1));
                        if (target) target.scrollIntoView();
                    }
                })
                .catch(function () {
                    fail('Could not load <code>' + param + '</code>.');
                });
        })();
    </script>
    <noscript>
        <div class="error" style="margin:1rem;">JavaScript is required for the HTML view. The Markdown sources are available directly, e.g. <a href="/SoundScript.md">/SoundScript.md</a>.</div>
    </noscript>
</body>
</html>
