<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SoundScript Playground — compile and play SoundScript in your browser." />
    <title>SoundScript Playground</title>
    <base href="/playground/" />
    <link rel="stylesheet" href="css/app.css" />
    <link href="SoundScript.Playground.styles.css" rel="stylesheet" />
</head>
<body>
    <div id="app">
        <div class="boot-screen">
            <div class="boot-spinner"></div>
            <p>Loading SoundScript Playground…</p>
        </div>

    <div id="blazor-error-ui">

        <a href="" class="reload">Reload</a>
        <a class="dismiss">✕</a>
    </div>

    <script src="js/soundfont-loader.js"></script>
    <script src="js/midi-player.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
